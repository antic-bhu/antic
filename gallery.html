    /* Carousel Styling */
    .carousel-item img {
      object-fit: cover;
      height: 60vh;
      width: 100%;
    }
    .carousel-caption {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 15px;
      color: #000;
    }

    /* Masonry Grid */
    .masonry-grid {
      column-count: 4;
      column-gap: 15px;
      padding: 15px;
    }
    @media (max-width: 1200px) { .masonry-grid { column-count: 3; } }
    @media (max-width: 768px) { .masonry-grid { column-count: 2; } }
    @media (max-width: 480px) { .masonry-grid { column-count: 1; } }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 15px;
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .masonry-item:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 15px rgba(0,0,0,0.2);
    }
    .masonry-item img {
      width: 100%;
      display: block;
      transition: opacity 0.3s ease;
    }
    .masonry-item .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(59, 163, 181, 0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      color: #fff;
      font-size: 24px;
    }
    .masonry-item:hover .overlay {
      opacity: 1;
    }

    /* Custom Lightbox Modal */
    #customLightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #customLightbox.show {
      display: flex;
      opacity: 1;
    }
    .lightbox-content {
      position: relative;
      max-width: 90%;
      max-height: 80%;
    }
    .lightbox-content img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 5px;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }
    .close-lightbox {
      position: absolute;
      top: 20px;
      right: 30px;
      color: #fff;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
      z-index: 10000;
    }
    .close-lightbox:hover { color: #ccc; }
    
    .share-container {
      margin-top: 20px;
      display: flex;
      gap: 15px;
    }
    .share-btn {
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .share-btn:hover {
      transform: scale(1.2);
    }
    .fade-in {
      animation: fadeIn 1s;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      fetch('/gallery.json')
        .then(response => response.json())
        .then(data => {
          // Populate Carousel
          const carouselInner = document.getElementById('carouselInner');
          const carouselIndicators = document.getElementById('carouselIndicators');
          
          data.carousel.forEach((src, index) => {
            const activeClass = index === 0 ? 'active' : '';
            
            // Indicator
            const indicator = document.createElement('button');
            indicator.type = 'button';
            indicator.dataset.bsTarget = '#carouselWithCaptions';
            indicator.dataset.bsSlideTo = index;
            if (index === 0) {
              indicator.classList.add('active');
              indicator.setAttribute('aria-current', 'true');
            }
            indicator.setAttribute('aria-label', `Slide ${index + 1}`);
            carouselIndicators.appendChild(indicator);
            
            // Item
            const item = document.createElement('div');
            item.className = `carousel-item ${activeClass}`;
            item.innerHTML = `<img src="${src}" class="d-block w-100 fade-in" loading="lazy" alt="Carousel Slide ${index + 1}">`;
            carouselInner.appendChild(item);
          });
          
          // Populate Masonry Grid
          const masonryGrid = document.getElementById('masonryGrid');
          data.grid.forEach(src => {
            const item = document.createElement('div');
            item.className = 'masonry-item fade-in';
            item.onclick = () => openLightbox(src);
            item.innerHTML = `
              <img src="${src}" loading="lazy" alt="Gallery Image">
              <div class="overlay"><i class="fa fa-expand"></i></div>
            `;
            masonryGrid.appendChild(item);
          });
        })
        .catch(err => console.error("Failed to load gallery data:", err));
    });

    const lightbox = document.getElementById('customLightbox');
    const lightboxImg = document.getElementById('lightboxImg');

    function openLightbox(src) {
      lightboxImg.src = src;
      lightbox.classList.add('show');
      
      // Update Share Links
      const pageUrl = encodeURIComponent(window.location.origin + src);
      const text = encodeURIComponent("Check out this photo from ANTIC 2024!");
      document.getElementById('shareFb').href = `https://www.facebook.com/sharer/sharer.php?u=${pageUrl}`;
      document.getElementById('shareTw').href = `https://twitter.com/intent/tweet?url=${pageUrl}&text=${text}`;
      document.getElementById('shareLi').href = `https://www.linkedin.com/sharing/share-offsite/?url=${pageUrl}`;
      document.getElementById('shareWa').href = `https://api.whatsapp.com/send?text=${text} ${pageUrl}`;
    }

    function closeLightbox() {
      lightbox.classList.remove('show');
      setTimeout(() => { lightboxImg.src = ''; }, 300);
    }
  </script>
